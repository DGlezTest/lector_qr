<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de acceso</title>
    <style>
        :root {
            --bg--color: #121212;
            --card--bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --success-color: #1b5e20;
            --error-color: #b71c1c;

        }

        body {
            font-family: Arial, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg--color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #container {
            text-align: center;
            transition: all 0.4s ease;
            padding: 2rem;
            border-radius: 20px;
            background-color: var(--card--bg);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;

        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            word-wrap: break-word;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* 4:3 Aspect Ratio */
            height: 0;
            border-radius: 12px;
            background-color: #000;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        #video-feed{
            position: absolute;
            top: 0;
            left: 0;   
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #status-message{
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-muted);
            margin-top: 1rem;
        }



        /* Estados dinámicos de autenticación con transiciones suaves */
        .success { background-color: var(--success-color) !important; }
        .error { background-color: var(--error-color) !important; }

        /* ======================================================= */
        /* MEDIA QUERIES: Adaptación para Tablets y Celulares       */
        /* ======================================================= */
        
        /* Ajustes para pantallas medianas (Tablets) */
        @media (max-width: 768px) {
            #container {
                max-width: 90%;
                padding: 1.5rem;
            }
            h1 { font-size: 1.8rem; }
            #status-message { font-size: 1.2rem; }
        }

        /* Ajustes para pantallas pequeñas (Celulares en vertical) */
        @media (max-width: 480px) {
            body { padding: 10px; }
            #container {
                max-width: 100%;
                padding: 1.2rem;
                border-radius: 15px;
            }
            h1 { font-size: 1.5rem; margin-bottom: 1rem; }
            #status-message { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="container">
        <h1 id="title">Escanee su Código QR</h1>
        
        <div class="video-wrapper">
            <img id="video-feed" src="/video_feed" alt="Cámara no disponible">
        </div>
        
        <div id="status-message">Esperando código...</div>
    </div>

    <script>
        // Conexión dinámica al WebSocket del server local
        const wsToken = new WebSocket(`ws://${window.location.host}/ws`);
        
        const container = document.getElementById('container');
        const titleElement = document.getElementById('title');
        const statusElement = document.getElementById('status-message');

        wsToken.onmessage = function(event) {
            const respuesta = JSON.parse(event.data);
            
            if (respuesta.status === "success") {
                container.classList.add('success');
                titleElement.innerText = `¡Bienvenido, ${respuesta.nombre}!`;
                statusElement.innerText = "Acceso Permitido ✅";
                reiniciarPantalla(4000);
            } 
            else if (respuesta.status === "denied") {
                container.classList.add('error');
                titleElement.innerText = "Acceso Denegado";
                statusElement.innerText = "Código QR Inválido o Expirado ❌";
                reiniciarPantalla(3000);
            }
        };

        function reiniciarPantalla(tiempo) {
            setTimeout(() => {
                container.classList.remove('success', 'error');
                titleElement.innerText = "Escanee su Código QR";
                statusElement.innerText = "Esperando código...";
            }, tiempo);
        }

        wsToken.onclose = () => {
            statusElement.innerText = "⚠️ Desconectado del servidor local.";
            statusElement.style.color = "#ffdd00";
        };
    </script>
</body>
</html>
